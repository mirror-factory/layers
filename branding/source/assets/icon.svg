<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Layers">
  <title>Layers</title>
  <!-- Paper-soft background (oklch(0.982 0.012 168) ≈ #fafdfb) -->
  <rect width="1024" height="1024" fill="#fafdfb"/>
  <!-- Aperture is centered: source viewBox is 32×32, so scale by 32 around (16,16) and translate to center.
       We render the same shapes as app/icon.svg, scaled to 1024 with proportional stroke widths. -->
  <g transform="translate(512 512) scale(32) translate(-16 -16)">
    <!-- Outer arc — blue (oklch(0.66 0.13 240) ≈ #5b9bd6) -->
    <path
      d="M16 4 a12 12 0 1 1 0 24"
      fill="none"
      stroke="#5b9bd6"
      stroke-linecap="round"
      stroke-width="2.6"
    />
    <!-- Middle arc — violet (oklch(0.66 0.16 282) ≈ #9b6ee0) -->
    <path
      d="M16 8.5 a7.5 7.5 0 1 1 0 15"
      fill="none"
      stroke="#9b6ee0"
      stroke-linecap="round"
      stroke-width="2.6"
    />
    <!-- Halo + dot — mint (oklch(0.68 0.13 166) ≈ #3fc4a3) -->
    <circle cx="16" cy="16" r="4" fill="#3fc4a3" opacity="0.22"/>
    <circle cx="16" cy="16" r="2" fill="#3fc4a3"/>
  </g>
</svg>
