name: Build & Release

# PROD-366: Branch-tiered release pipeline.
#
# - Push to `development`: no native artifact build here.
# - Push to `staging`: runs native release-candidate builds, uploads artifacts
#   to GitHub Actions, and uploads iOS to TestFlight for internal QA.
# - Push to `main`: runs `web` only as a production deploy guard.
# - Push tag `vX.Y.Z`: runs the full artifact matrix, uploads artifacts to
#   GitHub Releases, and ships iOS to TestFlight.
# - workflow_dispatch (manual): same matrix, with a toggle to skip Apple builds
#   when signing secrets aren't ready yet.
on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      include_apple_builds:
        description: 'Run macOS Electron and iOS Capacitor builds'
        type: boolean
        default: true

# A staging push or tagged push triggers native artifact jobs. Only a tag
# publishes the GitHub Release that the public website downloads from.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IS_RELEASE: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'push' && github.ref_name == 'staging') }}

jobs:
  web:
    name: Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:tier 0 1
      - run: pnpm build

  electron-mac:
    name: Electron (macOS)
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && inputs.include_apple_builds == true)
    runs-on: macos-latest
    env:
      # PROD-380: signing+notarization wired through env. When CSC_LINK is empty
      # the workflow skips signing/notarize and ships an unsigned dmg + warning.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Optional fallback: app-specific password (used only if API key absent).
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Detect signing and notarization readiness
        id: signing
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "signing_enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Code signing::CSC_LINK present — DMG will be signed."
          else
            echo "signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Code signing skipped::CSC_LINK is empty. DMG will be UNSIGNED. macOS Gatekeeper will block first launch (PROD-380). Populate CSC_LINK + CSC_KEY_PASSWORD secrets to enable signing."
            exit 0
          fi

          if [ -n "${APPLE_API_KEY_BASE64:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "notarization_method=api_key" >> "$GITHUB_OUTPUT"
            echo "::notice title=Notarization::App Store Connect API key secrets present."
          elif [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "notarization_method=apple_id" >> "$GITHUB_OUTPUT"
            echo "::notice title=Notarization::Apple ID app-specific password secrets present."
          else
            echo "::error title=Notarization blocked::Signing is enabled, but notarization credentials are incomplete. Provide either APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER + APPLE_TEAM_ID, or APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID. Refusing to publish a signed-but-unnotarized macOS app."
            exit 1
          fi

      - name: Decode notarytool API key (.p8)
        if: steps.signing.outputs.signing_enabled == 'true' && steps.signing.outputs.notarization_method == 'api_key'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "::notice::Decoded notarytool API key to $KEY_PATH"

      - run: pnpm install --frozen-lockfile

      - name: Build (signed + notarized)
        if: steps.signing.outputs.signing_enabled == 'true'
        run: |
          # PROD-380 / PROD-512: electron-builder.yml ships with
          # `notarize: true`. The readiness step above prevents
          # electron-builder from silently producing a signed-but-unnotarized
          # app when notary credentials are incomplete.
          npx electron-builder --config electron-builder.yml --mac --publish never

      - name: Verify macOS signing and notarization
        if: steps.signing.outputs.signing_enabled == 'true'
        run: |
          set -euo pipefail
          APP_PATH="$(find dist-electron -path '*/Layers.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error title=Missing macOS app::No Layers.app found under dist-electron."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Build (unsigned fallback)
        if: steps.signing.outputs.signing_enabled != 'true'
        env:
          # Force-disable signing so electron-builder doesn't try to use the
          # pinned `identity` and fail on a missing keychain entry.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          # Strip the pinned identity AND notarize flag for this unsigned run.
          sed -i.bak '/^  identity: /d' electron-builder.yml
          sed -i.bak 's/^  notarize: true$/  notarize: false/' electron-builder.yml
          npx electron-builder --config electron-builder.yml --mac --publish never
          echo "::warning title=Unsigned DMG::Built without code signing. Users will see a Gatekeeper warning. See docs/SIGNING.md."

      - name: Record macOS artifact proof
        run: pnpm build:release
        env:
          RELEASE_ARTIFACT_ROOTS: dist-electron
          RELEASE_ARTIFACTS_REQUIRED: "1"

      - uses: actions/upload-artifact@v7
        with:
          name: electron-mac
          include-hidden-files: true
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            .evidence/

  electron-windows:
    name: Electron (Windows)
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx electron-builder --config electron-builder.yml --win --publish never
      - name: Record Windows artifact proof
        run: pnpm build:release
        env:
          RELEASE_ARTIFACT_ROOTS: dist-electron
          RELEASE_ARTIFACTS_REQUIRED: "1"
      - uses: actions/upload-artifact@v7
        with:
          name: electron-windows
          include-hidden-files: true
          path: |
            dist-electron/*.exe
            dist-electron/*.msi
            .evidence/

  capacitor-android:
    name: Capacitor (Android APK/AAB)
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LAYERS_ANDROID_KEYSTORE_BASE64: ${{ secrets.LAYERS_ANDROID_KEYSTORE_BASE64 }}
      LAYERS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.LAYERS_ANDROID_KEYSTORE_PASSWORD }}
      LAYERS_ANDROID_KEY_ALIAS: ${{ secrets.LAYERS_ANDROID_KEY_ALIAS }}
      LAYERS_ANDROID_KEY_PASSWORD: ${{ secrets.LAYERS_ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4
      - run: pnpm install --frozen-lockfile
      - run: rm -rf android
      - run: npx cap add android
      - run: npx cap sync android
      - run: pnpm native:patch
      - name: Configure Android release signing
        id: android_signing
        run: |
          if [ -n "${LAYERS_ANDROID_KEYSTORE_BASE64:-}" ] &&
             [ -n "${LAYERS_ANDROID_KEYSTORE_PASSWORD:-}" ] &&
             [ -n "${LAYERS_ANDROID_KEY_ALIAS:-}" ] &&
             [ -n "${LAYERS_ANDROID_KEY_PASSWORD:-}" ]; then
            KEYSTORE_PATH="$RUNNER_TEMP/layers-upload.jks"
            echo "$LAYERS_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            chmod 600 "$KEYSTORE_PATH"
            echo "LAYERS_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "release_signing_enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Android signing::Upload-key secrets present — signed release AAB will be built."
          else
            echo "release_signing_enabled=false" >> "$GITHUB_OUTPUT"
            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              echo "::error title=Android signing blocked::Tagged releases require LAYERS_ANDROID_KEYSTORE_BASE64, LAYERS_ANDROID_KEYSTORE_PASSWORD, LAYERS_ANDROID_KEY_ALIAS, and LAYERS_ANDROID_KEY_PASSWORD."
              exit 1
            fi
            echo "::warning title=Android signed AAB skipped::Upload-key secrets are incomplete. Debug APK will still be built for smoke proof, but Play internal testing needs the signed AAB."
          fi
      - run: cd android && ./gradlew assembleDebug
      - name: Build signed Android release AAB
        if: steps.android_signing.outputs.release_signing_enabled == 'true'
        run: cd android && ./gradlew :app:bundleRelease
      - name: Record Android artifact proof
        run: pnpm build:release
        env:
          RELEASE_ARTIFACT_ROOTS: android/app/build/outputs
          RELEASE_ARTIFACTS_REQUIRED: "1"
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          include-hidden-files: true
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/release/*.aab
            .evidence/

  capacitor-ios:
    name: Capacitor (iOS) → TestFlight
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && inputs.include_apple_builds == true)
    runs-on: macos-latest
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Add and sync iOS platform
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          pnpm native:patch

      - name: Set build number from run
        # PROD-364: monotonically-increasing build number per CI run, kept
        # high enough to never collide with the timestamp-based local one.
        run: |
          BUILD_NUM="${GITHUB_RUN_NUMBER}$(date +%H%M)"
          echo "Setting CURRENT_PROJECT_VERSION = $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" \
            ios/App/App/Info.plist || true
          # Also patch pbxproj so xcodebuild picks it up
          sed -i.bak "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" \
            ios/App/App.xcodeproj/project.pbxproj

      - name: Detect signing readiness
        id: tf
        # iOS signing on a fresh CI runner has two requirements:
        #   1. APPLE_TEAM_ID set (cheap)
        #   2. App Store Connect API key (.p8) for `xcodebuild
        #      -allowProvisioningUpdates` to fetch/create provisioning
        #      profiles unattended. Without it, the archive step fails
        #      with "Signing for App requires a development team".
        # We can NOT substitute APPLE_ID + app-specific password here —
        # that combo only works for `altool --upload-app`, not for
        # Xcode's provisioning auto-update.
        run: |
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=APPLE_TEAM_ID secret missing" >> "$GITHUB_OUTPUT"
          elif [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "method=api_key" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=APPLE_API_KEY_ID + APPLE_API_ISSUER + APPLE_API_KEY required for unattended iOS signing" >> "$GITHUB_OUTPUT"
            echo "::warning title=iOS archive skipped::App Store Connect API key not configured. Generate at https://appstoreconnect.apple.com/access/users (Integrations tab → Keys) and add APPLE_API_KEY_ID, APPLE_API_ISSUER, APPLE_API_KEY (base64 of the .p8) as repo secrets. Until then iOS uploads must run from a developer Mac via Xcode → Transporter."
          fi

      - name: Decode App Store Connect API key (.p8)
        if: steps.tf.outputs.method == 'api_key'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Archive iOS app
        if: steps.tf.outputs.ready == 'true'
        # `cap add ios` regenerates a fresh project.pbxproj that has
        # DEVELOPMENT_TEAM = "" — Xcode's UI normally sets this. On CI
        # we inject it via build settings overrides at archive time.
        # CODE_SIGN_STYLE=Automatic + -allowProvisioningUpdates lets
        # Xcode fetch profiles using the App Store Connect API key.
        run: |
          cd ios/App
          xcodebuild archive \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Layers.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER=com.mirafactory.layers \
            -quiet

      - name: Export IPA (App Store)
        if: steps.tf.outputs.ready == 'true'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Layers.xcarchive" \
            -exportPath "$RUNNER_TEMP/LayersExport" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        if: steps.tf.outputs.method == 'api_key'
        # The App Store Connect API key path is the only supported
        # CI upload method. Apple ID + app-specific password technically
        # works for `altool` but cannot drive `-allowProvisioningUpdates`,
        # so we'd never have reached this step without the API key anyway.
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/LayersExport/App.ipa" \
            -t ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"

      - name: Record iOS artifact proof
        if: steps.tf.outputs.ready == 'true'
        run: pnpm build:release
        env:
          RELEASE_ARTIFACT_ROOTS: ${{ runner.temp }}/LayersExport,${{ runner.temp }}/Layers.xcarchive
          RELEASE_ARTIFACTS_REQUIRED: "1"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-ipa
          include-hidden-files: true
          path: |
            ${{ runner.temp }}/LayersExport/*.ipa
            ${{ runner.temp }}/Layers.xcarchive
            .evidence/

  release:
    name: Attach artifacts to GitHub Release
    needs: [electron-mac, electron-windows, capacitor-android]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: electron-mac
          path: artifacts/mac

      - uses: actions/download-artifact@v8
        with:
          name: electron-windows
          path: artifacts/windows

      - uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: artifacts/android

      - name: Rename artifacts to canonical names
        # /download page expects these stable filenames at /releases/latest/download/
        run: |
          mkdir -p release-assets
          # Mac arm64 + x64
          for f in artifacts/mac/*.dmg; do
            case "$f" in
              *arm64*) cp "$f" "release-assets/Layers-mac-arm64.dmg" ;;
              *)       cp "$f" "release-assets/Layers-mac-x64.dmg"   ;;
            esac
          done
          # Windows
          for f in artifacts/windows/*.exe; do
            cp "$f" "release-assets/Layers-windows.exe"
            break
          done
          # Android
          APK="$(find artifacts/android -name '*.apk' -type f | head -n 1)"
          if [ -n "$APK" ]; then
            cp "$APK" "release-assets/Layers-android.apk"
          fi
          AAB="$(find artifacts/android -name '*.aab' -type f | head -n 1)"
          if [ -n "$AAB" ]; then
            cp "$AAB" "release-assets/Layers-android.aab"
          fi
          ls -la release-assets/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            release-assets/* \
            --title "Layers $TAG" \
            --generate-notes \
            --latest \
          || gh release upload "$TAG" release-assets/* --clobber
