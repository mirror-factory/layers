name: AI Dev Kit Gates

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  fast-gates:
    name: Tier 0-1 Fast Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tier 0 and 1
        run: pnpm verify:tier 0 1

      - name: Run evals
        id: evals
        continue-on-error: true
        run: pnpm eval

      - name: Report eval results
        if: steps.evals.outcome == 'failure'
        run: |
          echo "::warning::Eval suite had failures. Review eval results."
          echo "## Eval Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Eval suite completed with failures. See job logs for details." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fast evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-0-1-evidence
          path: |
            .evidence/
            test-results/
          retention-days: 30

  focused-browser-proof:
    name: Tier 2 Focused Browser Proof
    runs-on: ubuntu-latest
    needs: fast-gates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run focused proof
        run: pnpm verify:tier 2
        env:
          CI: true
          PLAYWRIGHT_DISABLE_VIDEO: "1"

      - name: Generate proof packet
        if: always()
        run: pnpm test:proof

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-2-proof
          path: |
            .evidence/
            playwright-report/
            test-results/
          retention-days: 30

  broad-browser-matrix:
    name: Tier 3 Broad Browser Matrix
    runs-on: ubuntu-latest
    needs: fast-gates
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tier 3
        run: pnpm verify:tier 3
        env:
          CI: true
          PLAYWRIGHT_VIDEO: retain-on-failure

      - name: Upload tier 3 artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-3-artifacts
          path: |
            .evidence/
            playwright-report/
            test-results/
          retention-days: 30
