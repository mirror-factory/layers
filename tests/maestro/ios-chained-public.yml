# Single chained run — landing → /download → /changelog (one session).
appId: com.mirafactory.layers
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: ios-walk-D1-landing

- tapOn: "See how it works"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: ios-walk-D5-download

# On /download, the "See what's new in v0.1.115" link should be tappable
- tapOn:
    text: "See what's new"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: ios-walk-D6-changelog
