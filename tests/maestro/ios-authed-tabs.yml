# Walk authed app via bottom tabs from /meetings.
appId: com.mirafactory.layers
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 6000

# Marketing landing → drawer → Meetings (enters authed shell)
- tapOn: "Open menu"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn: "Meetings"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: ios-walk-E1d-meetings-landed

# Record tab
- tapOn: "Record"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: ios-walk-F0-record-tab

# Ask tab
- tapOn: "Ask"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: ios-walk-G2-ask-tab

# Back to Library tab
- tapOn: "Library"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: ios-walk-E1c-library-tab
