<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Showcase | Layers</title>
    <link rel="stylesheet" href="/src/index.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: hsl(var(--background, 0 0% 100%));
            color: hsl(var(--foreground, 0 0% 9%));
        }

        .showcase-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .showcase-header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid hsl(var(--border, 0 0% 90%));
        }

        .showcase-header h1 {
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .showcase-header p {
            margin: 0;
            font-size: 1.1rem;
            color: hsl(var(--muted-foreground, 0 0% 45%));
        }

        .showcase-content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .component-card {
            border: 1px solid hsl(var(--border, 0 0% 90%));
            border-radius: 12px;
            padding: 1.5rem;
            background: hsl(var(--card, 0 0% 100%));
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .component-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -8px rgba(0, 0, 0, 0.1);
        }

        .component-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: hsl(var(--foreground, 0 0% 9%));
        }

        .component-description {
            font-size: 0.9rem;
            color: hsl(var(--muted-foreground, 0 0% 45%));
            margin: 0 0 1rem 0;
        }

        .component-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .meta-badge {
            padding: 0.25rem 0.5rem;
            background: hsl(var(--secondary, 0 0% 96%));
            border-radius: 4px;
            font-size: 0.75rem;
            color: hsl(var(--secondary-foreground, 0 0% 9%));
        }

        .component-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border: 1px solid hsl(var(--border, 0 0% 90%));
            border-radius: 6px;
            background: hsl(var(--background, 0 0% 100%));
            color: hsl(var(--foreground, 0 0% 9%));
            text-decoration: none;
            font-size: 0.875rem;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .action-btn:hover {
            background: hsl(var(--accent, 0 0% 96%));
        }

        .action-btn.primary {
            background: hsl(var(--primary, 220 14% 96%));
            border-color: hsl(var(--primary, 220 14% 96%));
            color: hsl(var(--primary-foreground, 0 0% 9%));
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: hsl(var(--muted-foreground, 0 0% 45%));
        }

        @media (max-width: 768px) {
            .showcase-content {
                padding: 1rem;
            }
            .component-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="showcase-container">
        <header class="showcase-header">
            <h1>UI Showcase</h1>
            <p>Interactive preview of all Layers components with Storybook integration</p>
        </header>

        <div class="showcase-content">
            <div id="registry-showcase" class="loading">
                Loading component registry...
            </div>
        </div>
    </div>

    <script>
        async function loadRegistry() {
            try {
                // Try to load from the registry API or file
                let registry;
                try {
                    const response = await fetch('/api/registry');
                    registry = await response.json();
                } catch {
                    // Fallback to local registry file
                    const response = await fetch('/.devkit/registry.json');
                    registry = await response.json();
                }

                renderShowcase(registry);
            } catch (error) {
                console.error('Failed to load registry:', error);
                document.getElementById('registry-showcase').innerHTML = `
                    <div class="loading">
                        <h3>Registry not available</h3>
                        <p>Unable to load component registry. Please ensure the development server is running.</p>
                        <p>Available components and pages will be displayed here when registry data is accessible.</p>

                        <div style="margin-top: 2rem; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto;">
                            <h4>Manual Component Access:</h4>
                            <ul style="text-align: left;">
                                <li><strong>Storybook:</strong> <a href="http://localhost:6006" target="_blank" class="action-btn">localhost:6006</a></li>
                                <li><strong>Main App:</strong> <a href="/" class="action-btn">localhost:1420</a></li>
                            </ul>
                        </div>
                    </div>
                `;
            }
        }

        function renderShowcase(registry) {
            const container = document.getElementById('registry-showcase');
            const components = registry.components || {};
            const pages = registry.pages || {};
            const apis = registry.apis || {};

            const totalItems = Object.keys(components).length + Object.keys(pages).length;

            if (totalItems === 0) {
                container.innerHTML = `
                    <div class="loading">
                        <h3>No components found</h3>
                        <p>Registry is empty. Create components to see them here.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h2>Registry Overview</h2>
                    <div style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem;">
                        <div class="meta-badge" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                            📦 ${Object.keys(components).length} Components
                        </div>
                        <div class="meta-badge" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                            📄 ${Object.keys(pages).length} Pages
                        </div>
                        <div class="meta-badge" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                            🔌 ${Object.keys(apis).length} APIs
                        </div>
                    </div>
                </div>
                <div class="component-grid">
            `;

            // Render components
            Object.entries(components).forEach(([name, component]) => {
                const storyUrl = component.stories ? `http://localhost:6006/?path=/story/${name.toLowerCase()}--default` : null;
                html += `
                    <div class="component-card">
                        <h3 class="component-name">${name}</h3>
                        <p class="component-description">${component.description || 'Component from Layers registry'}</p>
                        <div class="component-meta">
                            <span class="meta-badge">Component</span>
                            ${component.variants ? `<span class="meta-badge">${component.variants.length} variants</span>` : ''}
                            ${component.stories ? `<span class="meta-badge">Story available</span>` : ''}
                        </div>
                        <div class="component-actions">
                            ${storyUrl ? `<a href="${storyUrl}" target="_blank" class="action-btn primary">View in Storybook</a>` : ''}
                            ${component.file ? `<a href="vscode://file${component.file}" class="action-btn">Open File</a>` : ''}
                        </div>
                    </div>
                `;
            });

            // Render pages
            Object.entries(pages).forEach(([name, page]) => {
                html += `
                    <div class="component-card">
                        <h3 class="component-name">${name}</h3>
                        <p class="component-description">${page.description || 'Page from Layers registry'}</p>
                        <div class="component-meta">
                            <span class="meta-badge">Page</span>
                            ${page.route ? `<span class="meta-badge">Route: ${page.route}</span>` : ''}
                        </div>
                        <div class="component-actions">
                            ${page.route ? `<a href="${page.route}" class="action-btn primary">View Page</a>` : ''}
                            ${page.file ? `<a href="vscode://file${page.file}" class="action-btn">Open File</a>` : ''}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // Load registry on page load
        loadRegistry();
    </script>
</body>
</html>
