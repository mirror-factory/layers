# pages.yaml -- every routable page the project ships.
#
# Auto-regenerated by `scripts/sync-registries.ts`. Each `app/**/page.tsx`
# becomes an entry. Dynamic routes preserve their brackets in `route`.
#
# Consumed by:
#   - /dev-kit/registries (tab: Pages) -- deep-links to the live route +
#     last Playwright video + Lighthouse score.
#   - doctor: enforces e2e-video + all 4 viewport/theme screenshots (per
#     observability-requirements.yaml `ui_coverage` rules for app/**/page.tsx).
#   - verify-before-stop: blocks Stop when a page was edited but visual /
#     e2e coverage isn't current.
#
# Fields per entry (all auto-populated unless marked *):
#   route              e.g. "/dev-kit/runs/[run_id]"
#   path               "app/dev-kit/runs/[run_id]/page.tsx"
#   viewports_tested   array of "mobile-light", "mobile-dark", "tablet-light",
#                      "tablet-dark", "desktop-light", "desktop-dark"
#   e2e_video_path     newest test-results/**/video.webm for this route
#   lighthouse_score   last captured (performance, a11y, best-practices, seo)
#   react_scan_clean   true | false (from scripts/react-scan-check.mjs)
#   million_optimized  true | false (from scripts/check-million.ts)
#   last_verified_on   ISO date
#   *owner             who owns the route
#   *auth              public | user | admin (documents intent)

