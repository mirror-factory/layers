# design-system.yaml -- THE design system for this project.
#
# Brand tokens (.ai-dev-kit/registries/design-tokens.yaml) are the PRIMITIVES
# (colors, typography, spacing, radius, shadow, motion, z-index).
#
# This file is the SYSTEM built on top of those primitives: component
# definitions with variants, states, composition rules, accessibility
# requirements. The implementation agent uses this as the contract when
# writing .tsx. Pre-push judges implemented components against it.
#
# Populated by @design-agent during `ai-dev-kit design <feature>`. Hand-
# edited freely afterwards. Every component declared here corresponds to
# a real file in components/** with matching variants/states.
#
# Consumed by:
#   - @design-agent (reads on refine; writes on initial design)
#   - scripts/check-brand-compliance.mts (judges components vs this spec)
#   - /dev-kit/design-system (renders the full system visually)
#   - sync-registries.ts (cross-references components.yaml against primitives)
#
# Structure:
#   - primitives: atomic components (Button, Input, Badge, Text, Icon)
#   - molecules:  compositions of primitives (FormField, SearchBar, Dialog.Trigger)
#   - organisms:  larger compositions (Navbar, Form, Dialog, Card)
#   - templates:  page-level layouts (DashboardTemplate, AuthTemplate)
#   - patterns:   interaction recipes (loading states, empty states, error states)
#
# Every component entry declares:
#   - purpose:   one-sentence what it's for
#   - variants:  list of visual variants (primary / secondary / ghost / destructive)
#   - states:    interactive states (default / hover / focus / active / disabled / loading)
#   - props:     key props with type hints
#   - a11y:      keyboard + screen-reader requirements
#   - tokens:    which design-tokens it must use (for enforcement)
#   - composition: which other components can nest inside

kind: design-system
schema_version: 1
last_synced_on: "2026-05-01"
source: "Layers Design System v1.0 - Paper Calm"
principles:
  - "Calm: paper-first surfaces, restrained contrast, and clear hierarchy."
  - "Organic: motion, waveforms, and the aperture mark make capture feel alive."
  - "Structured: every app surface pulls from tokenized color, type, spacing, radius, and motion."
  - "Confident: one primary action per screen; no decorative UI that fights the workflow."
  - "Inevitable: if a value is not a Layers token, propose the token before shipping the UI."

# ─── Primitives ────────────────────────────────────────────────────────
primitives:
  Button:
    purpose: "Trigger an action. Use the Layers button recipe: dark recorder primary, mint affirmative, paper secondary, soft, and ghost."
    variants: [primary, accent, secondary, soft, ghost, destructive]
    states: [default, hover, focus, active, disabled, loading]
    props:
      variant: "'primary' | 'accent' | 'secondary' | 'soft' | 'ghost' | 'destructive'"
      size: "'sm' | 'md' | 'default' | 'lg' | 'icon'"
      disabled: "boolean"
      loading: "boolean"
      icon: "ReactNode (optional; left position)"
      children: "ReactNode"
    a11y:
      - "Must render as <button>; Link-styled buttons are a separate primitive"
      - "Focus ring visible; never outline:none without a replacement"
      - "aria-busy when loading"
      - "Disabled state is not focusable"
    tokens:
      bg: [layers.ink, layers.mint, bg.surface, layers.mint-tint]
      text: [fg.default, fg.muted, layers.paper]
      radius: [radius.md, radius.pill]
      shadow: [shadow.xs, shadow.sm]
      motion: [duration.fast, ease.out]
    composition: "May contain Icon, Text"

  Input:
    purpose: "Single-line text entry. Borders stay subtle; mint focus glow is the only strong signal."
    variants: [default, filled]
    states: [default, hover, focus, disabled, error]
    props:
      type: "'text' | 'email' | 'password' | 'number' | 'search'"
      value: "string"
      onChange: "(event) => void"
      placeholder: "string"
      disabled: "boolean"
      'aria-invalid': "boolean"
    a11y:
      - "Must have an associated <label> (use FormField molecule)"
      - "aria-invalid when error state"
      - "aria-describedby links to error message if present"
    tokens:
      bg: [bg.surface]
      border: [border.default, layers.mint]
      radius: [radius.md]

  Text:
    purpose: "Typographic primitive. Geist everywhere; display weight is reserved for hero headlines and the recorder clock."
    variants: [display, headline, title, body, caption, code]
    states: []
    props:
      as: "'h1' | 'h2' | 'h3' | 'p' | 'span' | 'small'"
      variant: "'display' | 'headline' | 'title' | 'body' | 'caption' | 'code'"
      color: "'primary' | 'muted' | 'inverse' | 'success' | 'warn' | 'error'"
      children: "ReactNode"
    tokens:
      font: [font.brand-sans, font.mono]
      size: [text.xs, text.sm, text.base, text.md, text.lg, text.xl, text.2xl, text.display]

  Icon:
    purpose: "SVG icon wrapper with consistent sizing + aria semantics."
    variants: []
    states: []
    props:
      name: "string (lucide icon name)"
      size: "'sm' | 'md' | 'lg'"
      'aria-label': "string (required if standalone)"

  Badge:
    purpose: "Status / count indicator. Non-interactive."
    variants: [neutral, live, info, success, warning]
    states: [default]

  LayersLogo:
    purpose: "Canonical Layers aperture mark and wordmark. Use across navigation, auth, download, and product chrome."
    variants: [mark, lockup, animated]
    states: [default]
    tokens:
      outer: [layers.blue]
      middle: [layers.violet]
      dot: [layers.mint]

# ─── Molecules ─────────────────────────────────────────────────────────
molecules:
  FormField:
    purpose: "Input + Label + Error + Helper composition."
    composes: [Text, Input]
    required_slots: [label, input]
    optional_slots: [helper, error]
    a11y:
      - "label `for` matches input `id`"
      - "error announces via role=alert"

  SearchBar:
    purpose: "Search input with clear button + optional submit."
    composes: [Input, Icon, Button]

# ─── Organisms ─────────────────────────────────────────────────────────
organisms:
  Navbar:
    purpose: "Top-level navigation. One per page; brand mark uses LayersLogo and actions use Button variants."
    composes: [Text, Button, Icon]
    responsive:
      mobile: "hamburger menu; links hidden until open"
      tablet: "condensed labels, icons visible"
      desktop: "full labels, right-aligned user menu"

  Dialog:
    purpose: "Modal overlay for focused tasks or confirmations."
    composes: [Button, Text, Icon]
    a11y:
      - "Traps focus while open"
      - "Esc closes"
      - "aria-modal=true, role=dialog"

# ─── Templates ─────────────────────────────────────────────────────────
templates:
  RecorderTemplate:
    purpose: "Hero recorder surface: date/context, giant clock, waveform, status, and one primary capture action."
    slots: [topbar, recorder-card, live-transcript?, secondary-rail?]
    tokens: [layers.mint, layers.violet, layers.blue, bg.page, bg.surface, radius.2xl, shadow.lg]

  DashboardTemplate:
    purpose: "Sidebar + top bar + main content. Used by /dev-kit/* pages."
    slots: [sidebar, topbar, main, footer?]

# ─── Patterns ──────────────────────────────────────────────────────────
patterns:
  loading:
    description: "Show Skeleton placeholders matching the shape of the final content. Never a spinner alone unless waiting <200ms is the exception."
  empty:
    description: "Explain why it's empty + offer the next action. Never a bare 'No items'."
  error:
    description: "Say what broke, what to try, and whether data is lost. Log with request_id visible."
