# tools.yaml -- every Zod-schema tool handed to an LLM.
#
# Auto-regenerated by `scripts/sync-registries.ts`, which scans for
# `lib/ai/tools/**/*.ts` exports matching the tool({...}) pattern from the
# AI SDK. Populates invocation_count via Langfuse + logAICall aggregation.
#
# Consumed by:
#   - /dev-kit/registries (tab: Tools) -- shows name, description, input
#     schema, call-count for the active run, test coverage status.
#   - doctor: "tool validate" check flags:
#       * tools without descriptions
#       * input schemas without doc strings
#       * tools never exercised by a test
#       * tools called zero times in the last 30 days (dead code)
#   - compliance-fix skill: targets "tool description quality" failures here.
#
# Fields:
#   name                 export name
#   path                 source file
#   description          from tool({description: ...})
#   input_schema_hash    sha256 of Zod shape; changes invalidate any cached rubric
#   has_test             true | false -- sibling *.test.ts with tool.name in it
#   description_score    0..1 -- LLM-as-judge rubric result from check-tool-quality.ts
#   invocation_count     rolling 30-day count (from logAICall.toolCalls)
#   last_invoked_at      ISO date
#   *owner               human-editable

kind: tools
schema_version: 1
last_synced_on: null
entries: []
