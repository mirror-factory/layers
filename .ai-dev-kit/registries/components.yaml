# components.yaml -- every UI component the project ships.
#
# Auto-regenerated by `scripts/sync-registries.ts` (runs in pre-commit). Do
# NOT hand-edit this list; add a component to `components/**/*.tsx` and it
# appears here on the next commit.
#
# Consumed by:
#   - /dev-kit/registries (tab: Components) -- preview via Storybook iframe
#   - doctor check: "ui_coverage" in observability-requirements.yaml enforces
#     that each component has storybook + visual (mobile/tablet/desktop) +
#     a11y + light/dark baselines.
#   - verify-before-stop: blocks Stop when a component file changed but a
#     required verification key is missing.
#
# Fields per entry (hand-editable subset marked with *):
#   name          derived from filename
#   path          relative to repo root
#   stories_path  sibling *.stories.tsx -- auto-detected
#   visual_path   sibling visual/<name>.spec.ts -- auto-detected
#   a11y_status   pass | fail | missing (from most recent vitest-axe run)
#   last_verified_on   ISO date (written by verify-claims.py)
#   viewports_tested   list of (mobile, tablet, desktop) x (light, dark)
#   props_schema_hash  sha256 of Zod/TS prop shape; drift invalidates baselines
#   *owner        human-editable; who to ask when this breaks
#   *status       draft | stable | deprecated (hand-set)

