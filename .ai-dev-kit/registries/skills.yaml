# skills.yaml -- every .claude/skills/*/SKILL.md the project ships, with usage.
#
# Auto-regenerated by `scripts/sync-registries.ts` from two sources:
#   1. `.claude/skills/*/SKILL.md` filesystem scan (structural data)
#   2. `.ai-dev-kit/state/skill-invocations.jsonl` rollup (usage data,
#      written by the record-skill-use.py PreToolUse hook)
#
# Why this matters: Vercel's eval shows skills auto-invoke at 79%, never-
# invoke at 56%. The kit's answer is to make invocation visible per-project.
# If compliance-fix has never fired, that's surfaced in doctor AND in the
# /dev-kit/registries (tab: Skills) dashboard.
#
# Fields:
#   name                   directory name under .claude/skills/
#   path                   path to SKILL.md
#   description            parsed from frontmatter (Claude Code's skill contract)
#   invocation_count       lifetime count across all runs
#   invocation_last_30d    rolling window
#   last_invoked_at        ISO date
#   last_run_id            run_id of the most recent invocation
#   success_rate           not yet tracked; reserved for future Stop-delta analysis
#   per_agent_top          {agent_name: count} -- who invokes it most

