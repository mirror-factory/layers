<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Layers">
  <title>Layers App Icon</title>
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="oklch(0.982 0.012 168)"/>

  <!-- Outer arc — blue -->
  <path
    d="M512 128 a384 384 0 1 1 0 768"
    fill="none"
    stroke="oklch(0.66 0.13 240)"
