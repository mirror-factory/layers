    stroke-width="84"
  />

  <!-- Middle arc — violet -->
  <path
    d="M512 272 a240 240 0 1 1 0 480"
    fill="none"
    stroke="oklch(0.66 0.16 282)"
    stroke-linecap="round"
    stroke-width="84"
  />

  <!-- Halo + dot — mint -->
  <circle cx="512" cy="512" r="128" fill="oklch(0.68 0.13 166)" opacity="0.22"/>
  <circle cx="512" cy="512" r="64" fill="oklch(0.68 0.13 166)"/>
</svg>