# Promptfoo Evaluation Configuration
# Generated by @mirror-factory/ai-dev-kit
# Run: npx promptfoo eval
# CI: npx promptfoo eval --output results.json
#
# Routes through Vercel AI Gateway so you only need AI_GATEWAY_API_KEY in
# the environment -- no per-vendor ANTHROPIC_API_KEY / OPENAI_API_KEY /
# GOOGLE_GENERATIVE_AI_API_KEY etc.
#
# Syntax notes (live-tested, these exact fields are required):
#   - apiKeyEnvar (NOT apiKey) -- promptfoo reads the env-var NAME and
#     resolves it at runtime. `apiKey: ${AI_GATEWAY_API_KEY}` does not
#     interpolate; it sends the literal string and you get 401.
#   - apiBaseUrl needs the full https:// prefix and the /v1 suffix for
#     the OpenAI-compatible endpoint.
#   - A prompts: block is required -- the OpenAI-compatible path does
#     not auto-interpolate vars without a template.

description: "AI Dev Kit Tool Evaluation Suite"

providers:
  - id: openai:chat:anthropic/claude-sonnet-4.5
    config:
      apiBaseUrl: https://ai-gateway.vercel.sh/v1
      apiKeyEnvar: AI_GATEWAY_API_KEY
      temperature: 0

  # Uncomment to enable cross-provider comparison -- same auth, same shape.
  # - id: openai:chat:openai/gpt-4.1
  #   config:
  #     apiBaseUrl: https://ai-gateway.vercel.sh/v1
  #     apiKeyEnvar: AI_GATEWAY_API_KEY
  #     temperature: 0
  #
  # - id: openai:chat:google/gemini-3-flash
  #   config:
  #     apiBaseUrl: https://ai-gateway.vercel.sh/v1
  #     apiKeyEnvar: AI_GATEWAY_API_KEY
  #     temperature: 0

prompts:
  - "{{prompt}}"

defaultTest:
  options:
    timeout: 30000

tests:
  # Search tool evaluation
  - vars:
      query: "authentication best practices"
      prompt: "Search for authentication best practices and summarize what you find."
    assert:
      - type: contains
        value: "auth"
      - type: javascript
        value: "output.length > 50"

  # Empty query handling
  - vars:
      query: ""
      prompt: "I want to search but I don't have a query. What should I do?"
    assert:
      - type: contains-any
        value: ["provide", "specify", "query", "search", "tell"]

  # Code review tool evaluation
  - vars:
      code: "const x = eval(userInput);"
      language: "typescript"
      prompt: "Review this TypeScript code for security issues: const x = eval(userInput);"
    assert:
      - type: contains-any
        value: ["security", "vulnerability", "eval", "dangerous", "unsafe"]
      - type: javascript
        value: "output.length > 50"

  # Content generation evaluation
  - vars:
      prompt: "Write a brief summary of authentication methods used in web applications."
    assert:
      - type: javascript
        value: "output.length > 100 && output.length < 5000"
      - type: contains-any
        value: ["OAuth", "JWT", "session", "token", "password"]
