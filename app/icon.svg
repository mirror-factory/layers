<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Layers">
  <title>Layers</title>
  <!-- Soft paper background so the aperture reads on dark and light browser tabs alike -->
  <rect width="32" height="32" rx="6.5" fill="oklch(0.982 0.012 168)"/>
  <!-- Outer arc — blue -->
  <path
    d="M16 4 a12 12 0 1 1 0 24"
    fill="none"
    stroke="oklch(0.66 0.13 240)"
    stroke-linecap="round"
    stroke-width="2.6"
  />
  <!-- Middle arc — violet -->
  <path
    d="M16 8.5 a7.5 7.5 0 1 1 0 15"
    fill="none"
    stroke="oklch(0.66 0.16 282)"
    stroke-linecap="round"
    stroke-width="2.6"
  />
  <!-- Halo + dot — mint -->
  <circle cx="16" cy="16" r="4" fill="oklch(0.68 0.13 166)" opacity="0.22"/>
  <circle cx="16" cy="16" r="2" fill="oklch(0.68 0.13 166)"/>
</svg>
